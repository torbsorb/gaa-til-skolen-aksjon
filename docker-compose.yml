services:
  postgres:
    image: postgres:16
    container_name: gotilskole_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gotilskole
      POSTGRES_PASSWORD: gotilskole
      POSTGRES_DB: gotilskole
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotilskole -d gotilskole"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
